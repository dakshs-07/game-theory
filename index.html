<!doctype html>
<html>
  <head>
    <title>IPD Simulator | Game Theory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>Iterated Prisoner's Dilemma</h2>
    <div class="container">
      <div class="form-row">
        <label for="rounds">Rounds</label>
        <input id="rounds" type="number" value="50" />
      </div>

      <div class="form-row">
        <label for="speed">Speed (ms)</label>
        <input id="speed" type="number" value="200" />
      </div>

      <div class="form-row">
        <label for="strategyA">Strategy A</label>
        <select id="strategyA"></select>
      </div>

      <div class="form-row">
        <label for="strategyB">Strategy B</label>
        <select id="strategyB"></select>
      </div>

      <div class="form-row">
        <label for="noise">Noise (0–1)</label>
        <input id="noise" type="number" step="0.01" min="0" max="1" value="0" />
      </div>
      <div>
        <button id="runBtn" onclick="run()" style="margin-top: 10px;">Run Simulation</button>
      </div>
    <div><button id="stopBtn" onclick="stop()" style="margin: 5px;">Stop</button>
</div></div>
    </div>
    <h3>Player A</h3>
    <div id="rowA" style="display: flex; gap: 4px; overflow-x: auto"></div>

    <h3>Player B</h3>
    <div id="rowB" style="display: flex; gap: 4px; overflow-x: auto"></div>

    <pre id="output"></pre>
    <h3>Leaderboard</h3>
    <div id="leaderboard"></div>

    <script type="module" src="main.js"></script>
  </body>
</html>
